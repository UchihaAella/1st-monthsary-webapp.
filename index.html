<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 1st Monthsary GA 💙</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: linear-gradient(to bottom, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* HOMEPAGE */
#home {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* Hidden content */
#mainContent {
    display: none;
}

/* Glass */
.glass {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    backdrop-filter: blur(10px);
    padding: 20px;
    margin: 15px;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -10px;
    animation: float 6s linear infinite;
}
@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}

/* Gallery */
.gallery img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 10px;
}

/* Videos */
video {
    border-radius: 15px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
}
</style>
</head>

<body>

<!-- 💙 BACKGROUND MUSIC -->
<audio id="bgMusic" autoplay loop>
    <source src="music/1.mp3" type="audio/mpeg">
</audio>

<!-- FLOATING HEARTS -->
<script>
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💙";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = Math.random() * 15 + 10 + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

<!-- 💙 HOMEPAGE -->
<section id="home">
    <h1>Welcome GA 💙</h1>
    <h2>Happy 1st Monthsary</h2>
    <button class="btn btn-light mt-4 px-4 py-2" onclick="enterSite()">
        Enter Our Love Story 💙
    </button>

   <!-- 💙 VIDEOS SECTION -->
<div class="container mt-5">
    <h3 class="mb-3">For you Asawa ko 🎥</h3>
    <div class="row g-3">

        <div class="col-12 col-md-4">
            <video class="w-100" controls loop>
                 <source src="videos/1.mp4" type="video/mp4"> 
            </video>
        </div>

        <div class="col-12 col-md-4">
            <video class="w-100" controls loop>
                <source src="videos/2.mp4" type="video/mp4">
            </video>
        </div>

        <div class="col-12 col-md-4">
            <video class="w-100" controls loop>
                <source src="videos/3.mp4" type="video/mp4">
            </video>
        </div>

        <div class="col-12 col-md-6">
            <video class="w-100" controls loop>
                <source src="videos/4.mp4" type="video/mp4">
            </video>
        </div>

        <div class="col-12 col-md-6">
            <video class="w-100" controls loop>
                <source src="videos/5.mp4" type="video/mp4">
            </video>
        </div>

    </div>
</div>
</section>

<!-- 💙 MAIN CONTENT -->
<div id="mainContent">

    <!-- LOVE LETTER -->
    <section class="glass">
        <h2>💌 My Message</h2>
        <p id="typing"></p>
    </section>

    <!-- GALLERY -->
    <section class="glass">
        <h2>📸 Pictures</h2>
        <div class="gallery">
          <img src="images/7.jfif"> 
          <img src="images/8.jfif"> 
          <img src="images/9.jfif"> 
          <img src="images/12.jfif">
        </div>
    </section>

    <!-- COUNTER -->
    <section class="glass">
        <h2>⏳ Time Together</h2>
        <p id="counter"></p>
    </section>

    <!-- SECRET -->
    <section class="glass">
        <button class="btn btn-primary w-75" onclick="showSecret()">For GA Only 🔒</button>
        <p id="secret" class="mt-2"></p>
    </section>

</div>

<script>
// ENTER BUTTON
function enterSite() {
    document.getElementById("home").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });

    // PLAY MUSIC AFTER CLICK (important for autoplay policy)
    document.getElementById("bgMusic").play();
}

// TYPING
let text = "Hi GA 💙 Thank you for loving me even from afar. This first month with you is something I will always treasure.";
let i = 0;
function typing() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing, 35);
    }
}
typing();

// COUNTER
let startDate = new Date("2026-02-23");
function updateCounter() {
    let now = new Date();
    let diff = now - startDate;
    let days = Math.floor(diff / (1000 * 60 * 60 * 24));
    document.getElementById("counter").innerText = days + " days together 💙";
}
setInterval(updateCounter, 1000);

// SECRET
function showSecret() {
    document.getElementById("secret").innerText =
        "No distance can change how much I love you, GA 💙";
}
</script>

</body>
</html>
